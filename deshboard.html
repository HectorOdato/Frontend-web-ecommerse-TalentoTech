<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZStride | Panel de Administración</title>
    <link rel="stylesheet" href="/css/deshboard.css">
</head>
<body>
    <div class="admin-container">
        <!-- Barra lateral -->
        <aside class="sidebar">
            <div class="logo">
                <h2><span>Z</span>Stride</h2>
                <p>Admin Panel</p>
            </div>
            <nav>
                <a href="#" class="activo">📦 Productos</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Gestión de Productos</h1>
            </header>
            <section class="card">
                <h2 id="form-titulo">Crear Nuevo Producto</h2>
                <form id="form-producto">
                    <input type="hidden" id="producto-id">
                    
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="nombre">Nombre del Producto</label>
                            <input type="text" id="nombre" required>
                        </div>

                        <div class="input-group">
                            <label for="categoria">Categoría</label>
                            <select id="categoria" required>
                                <option value="">Seleccionar...</option>
                                <option value="6a50ee042478b3c06a5c81a8">Calzado</option>
                                <option value="6a516a4796709aa22ba09bda">Indumentaria</option>
                                <option value="6a516a5f96709aa22ba09bdb">Accesorios</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="precio">Precio ($)</label>
                            <input type="number" id="precio" step="0.01" required>
                        </div>

                        <div class="input-group">
                            <label for="stock">Unidades en Stock</label>
                            <input type="number" id="stock" required>
                        </div>
                        <div class="input-group">
                            <label for="imagenURL">URL de la Imagen</label>
                            <input type="text" id="imagenURL" required>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" rows="3" required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-guardar" class="btn-primary">Guardar Producto</button>
                        <button type="button" id="btn-cancelar" class="btn-secondary hidden">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <h2>Inventario</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="deshboard.js"></script>
</body>
</html>
